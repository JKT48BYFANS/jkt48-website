<!DOCTYPE html>
<html>
<head>
    <title>Profile Member</title>

    <style>

        @font-face {
            font-family: 'Insanibu';
            src: url('Fonts/Insanibu.ttf');
        }

        @font-face {
            font-family: 'Insanibc';
            src: url('Fonts/Insanibc.ttf');
        }

        body {
            margin: 0;
            font-family: 'Insanibu', sans-serif;
            background: #f5f5f5;
            display: block;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .content {
            margin-top: 85px;
        }

        .page {
            margin-top: 110px;
            justify-content: center;
            align-items: flex-start;
        }

        .top-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(90deg, #e20785 15%, #f69220 50%, #e20514);
            padding: 20px 0;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            gap: 10px;
        }

        .header-content {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            color: #ffffff;
            font-size: 40px;
        }

        .header-left {
            position: absolute;
            left: 15px;
        }

        .header-right {
            position: absolute;
            right: 15px;
            display: flex;
            gap: 8px;
        }

        .header-btn {
            padding: 6px 12px;
            font-size: 14px;
            background-color: #ffffff;
            color: #e20514;
            border: 2px solid #e20514;
            border-radius: 8px;
            cursor: pointer;    
            font-family: 'Insanibc', sans-serif;
        }

        .header-btn:hover {
            background-color: #e20514;
            color: white;
        }

        .header-btn.active {
            background-color: #e20514;
            color: white;
            border: 3px solid white;
            transform: scale(1.05);
        }

        /* ================= CENTER CONTENT ================= */
        .page {
            margin-top: 100px;
        }

        /* ================= CARD ================= */
        .member-card {
            width: 200px;
            min-height: 240px;
            border-radius: 12px;
            padding: 20px 14px;
            text-align: center;
            border: 3px solid #e20514;
            box-shadow: 0 6px 12px rgba(0,0,0,1);
            background: #ffffff;
        }

        .group-name {
            opacity: 0;
            animation: fadeSlideUp 0.5s ease forwards;
            animation-delay: 0.4s;
            font-size: 18px !important;
            margin-top: -10px;
            margin-bottom: 10px;
        }

        .member-title {
            opacity: 0;
            animation: fadeSlideUp 0.5s ease forwards;
            animation-delay: 0.5s;
            white-space: nowrap;
        }

        .member-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            box-shadow: 0 6px 15px rgba(0,0,0,1);
            transform: scale(1.08);
        }

        .mini-photo {
            width: 100%;
            aspect-ratio: 1 / 1; 
            overflow: hidden;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 2.5px solid #e20514;
            box-sizing: border-box;
        }

        .mini-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .member-name {
            font-size: 15px;
            margin-top: 20px;
            color: #e20514;
            letter-spacing: 2.5px;
        }

        .member-gen {
            background: #e20514;
            color: white;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 999px;
            display: inline-block;
            margin-top: 5px;
        }

        .back-btn {
            margin-top: 15px;
            padding: 8px 12px;
            border: none;
            background: #e20514;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        .back-btn:hover {
            background: #b8000f;
        }

        body.bg-love {
            background-image: url("Love.jpg");
        }

        body.bg-dream {
            background-image: url("Dream.jpg");
        }

        body.bg-passion {
            background-image: url("Passion.jpg");
        }

        body.bg-trainee {
            background-image: url("Trainee.jpg");
        }

        body.bg-virtual {
            background-image: url("Virtual.jpg");
        }

        body {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* ================= TEAM LOVE ================= */
        .member-card.TeamLove {
            background: rgb(255, 235, 245);
            border-color: rgb(226, 7, 133);
        }

        .TeamLove .member-name {
            color: rgb(226, 7, 133);
        }

        .TeamLove .member-gen {
            background: rgb(226, 7, 133);
        }

        .TeamLove .profile-btn {
            background: rgb(226, 7, 133);
        }

        /* ================= TEAM DREAM ================= */
        .member-card.TeamDream {
            background: rgb(225, 255, 255);
            border-color: rgb(0, 164, 165);
        }

        .TeamDream .member-name {
            color: rgb(0, 164, 165);
        }

        .TeamDream .member-gen {
            background: rgb(0, 164, 165);
        }

        /* ================= TEAM PASSION ================= */
        .member-card.TeamPassion {
            background: rgb(255, 245, 235);
            border-color: rgb(246, 146, 32);
        }

        .TeamPassion .member-name {
            color: rgb(246, 146, 32);
        }

        .TeamPassion .member-gen {
            background: rgb(246, 146, 32);
        }

        /* ================= TRAINEE ================= */
        .member-card.Trainee {
            background: rgb(255, 250, 196);
            border-color: rgb(196, 120, 120);
        }

        .Trainee .member-name {
            color: rgb(196, 120, 120);
        }

        .Trainee .member-gen {
            background: rgb(196, 120, 120);
        }

        /* ================= VIRTUAL ================= */
        .member-card.Virtual {
            background: rgb(225, 225, 255);
            border-color: rgb(3, 70, 192);
        }

        .Virtual .member-name {
            color: rgb(3, 70, 192);
        }

        .Virtual .member-gen {
            background: rgb(3, 70, 192);
        }

        #pageTransition {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .profile-container {
            background: rgba(255,255,255);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,1);
            max-width: 900px;
            width: 95%;
            opacity: 0;
            animation: fadeSlideUp 0.6s ease forwards;
            will-change: transform, opacity;
            margin: 0 auto; 
        }

        .profile-container:nth-of-type(1) {
            animation-delay: 0.1s;
        }

        .profile-container:nth-of-type(2) {
            animation-delay: 0.3s;
        }

        .profile-layout {
            margin: 0 auto;
            max-width: 850px;
            display: flex;
            gap: 22px;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
        }

        /* BOX FOTO */
        .box-photo {
            width: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-left: 0;
        }

        /* BOX INFO */
        .box-info {
            width: 100%;
            max-width: 760px;
            margin-left: 0;
        }

        .info-box {
            opacity: 0;
            animation: fadeSlideUp 0.5s ease forwards;
        }

        .profile-info .info-box {
            opacity: 0;
            animation: fadeSlideUp 0.5s ease forwards;
        }

        .profile-info .info-box.full {
            animation-delay: 0.4s;
        }

        .profile-info .info-box:nth-of-type(2) { animation-delay: 0.5s; } /* lahir */
        .profile-info .info-box:nth-of-type(3) { animation-delay: 0.55s; } /* status */
        .profile-info .info-box:nth-of-type(4) { animation-delay: 0.6s; } /* tinggi */
        .profile-info .info-box:nth-of-type(5) { animation-delay: 0.65s; } /* darah */
        .profile-info .info-box:nth-of-type(6) { animation-delay: 0.7s; } /* zodiac */
        .profile-info .info-box:nth-of-type(7) { animation-delay: 0.75s; } /* fanbase */

        .double-row {
            opacity: 0;
            animation: fadeSlideUp 0.5s ease forwards;
            animation-delay: 0.85s;
        }

        .profile-header {
            text-align: center;
        }

        .member-gen-text {
            animation-delay: 0.3s;
        }

        /* ===== LEFT FOTO ===== */
        .profile-left {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ===== RIGHT INFO ===== */
        .profile-right {
            width: 100%;
            max-width: 750px;
        }   

        .profile-header .member-title {
            font-size: 36px;
            background: linear-gradient(
                90deg,
                #e20785 25%,
                #e20514 50%,
                #f69220 75%
            );
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            text-align: center;
            white-space: normal;
            animation-delay: 0.2s;
        }

        /* INFO BOX */
        .profile-info {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
            margin: 0 auto;
        }

        .info-box p {
            margin: 0;
            font-size: 16px;
            color: rgb(0, 0, 0);
            white-space: nowrap; 
        }

        .debut-social {
            grid-column: span 2;
        }

        .info-box {
            background: #ffffff;
            padding: 12px;
            border-radius: 10px;
            box-shadow: 0 3px 8px rgba(0,0,0,1);
            text-align: center;
        }
        
        .info-box span {
            font-size: 18px;
            display: block;
            margin-top: 4px;
            white-space: normal;       
            overflow: visible;           
            text-overflow: unset;    
            line-height: 1.6; 
        }

        .section-title {
            display: inline-block;
            padding: 8px 14px;
            color: white;
            border-radius: 10px;
            border: 3px solid transparent;
            margin-bottom: 15px;
            margin-top: 10px;
            box-shadow: 0 3px 8px rgba(0,0,0,1);
        }
        
        .TeamLove  .section-title {
            background: linear-gradient(90deg, #e20785, #ff43e0);
            border-color: #8400ff;
        }

        .TeamDream  .section-title {
            background: linear-gradient(90deg, #00a4a5, #4da6ff);
            border-color: #0004ff;
        }

        .TeamPassion .section-title {
            background: linear-gradient(90deg, #f69220, #ffa600);
            border-color: #ff5e00;
        }

        .Trainee .section-title {
            background: linear-gradient(90deg, #c47878, #ff5252);
            border-color: #743f3f;
        }

        .Virtual .section-title {
            background: linear-gradient(90deg, #0346c0, #3503c0);
            border-color: #002873;
        }

        /* BUTTON */
        .fan-btn {
            margin-top: 20px;
            background: linear-gradient(90deg, pink, hotpink);
            color: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
        }

        .info-box.full {
            grid-column: span 3;
        }

        .inline-info {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }

        .double-row {
            grid-column: span 3; 
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .name-vertical {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            height: 350px;
            position: relative;
            left: 15px;
            top: -25px;
        }

        .name-vertical span {
            font-size: 62px;
            letter-spacing: 2px;
        }

        .name-vertical::before,
        .name-vertical::after {
            content: "";
            width: 6px;
            height: 100%;
            margin: 2px 0;
            display: none;
        }

        /* TEAM LOVE */
        .TeamLove .member-nickname {
            color: rgb(226, 7, 133);
            text-shadow: 
                1px 1px 0 rgb(255, 255, 255),
                -1px -1px 0 rgb(255, 255, 255),
                1px -1px 0 rgb(255, 255, 255),
                -1px 1px 0 rgb(255, 254, 255);
        }

        /* TEAM DREAM */
        .TeamDream .member-nickname {
            color: rgb(0, 164, 165);
            text-shadow: 
                1px 1px 0 rgb(255, 255, 255),
                -1px -1px 0 rgb(255, 255, 255),
                1px -1px 0 rgb(255, 255, 255),
                -1px 1px 0 rgb(255, 255, 255);
        }

        /* TEAM PASSION */
        .TeamPassion .member-nickname {
            color: rgb(246, 146, 32);
            text-shadow: 
                1px 1px 0 rgb(255, 255, 255),
                -1px -1px 0 rgb(255, 255, 255),
                1px -1px 0 rgb(255, 255, 255),
                -1px 1px 0 rgb(255, 255, 255);
        }

        /* TRAINEE */
        .Trainee .member-nickname {
            color: rgb(196, 120, 120);
            text-shadow: 
                1px 1px 0 rgb(255, 255, 255),
                -1px -1px 0 rgb(255, 255, 255),
                1px -1px 0 rgb(255, 255, 255),
                -1px 1px 0 rgb(255, 255, 255);
        }

        /* VIRTUAL */
        .Virtual .member-nickname {
            color: rgb(3, 70, 192);
            text-shadow: 
                1px 1px 0 rgb(255, 255, 255),
                -1px -1px 0 rgb(255, 255, 255),
                1px -1px 0 rgb(255, 255, 255),
                -1px 1px 0 rgb(255, 255, 255);
        }

        /* ================= PROFILE CONTAINER IKUT TEAM ================= */

        /* TEAM LOVE */
        .profile-container.TeamLove {
            background: rgb(255, 235, 245);
            border: 3px solid rgb(226, 7, 133);
        }

        /* TEAM DREAM */
        .profile-container.TeamDream {
            background: rgb(225, 255, 255);
            border: 3px solid rgb(0, 164, 165);
        }

        /* TEAM PASSION */
        .profile-container.TeamPassion {
            background: rgb(255, 245, 235);
            border: 3px solid rgb(246, 146, 32);
        }

        /* TRAINEE */
        .profile-container.Trainee {
            background: rgb(255, 250, 196);
            border: 3px solid rgb(196, 120, 120);
        }

        /* VIRTUAL */
        .profile-container.Virtual {
            background: rgb(225, 225, 255);
            border: 3px solid rgb(3, 70, 192);
        }

        /* ================= INFO BOX IKUT WARNA CARD ================= */

        /* TEAM LOVE */
        .profile-container.TeamLove .info-box {
            background: rgb(255, 235, 245);
            border: 2px solid rgb(226, 7, 133);
        }

        /* TEAM DREAM */
        .profile-container.TeamDream .info-box {
            background: rgb(225, 255, 255);
            border: 2px solid rgb(0, 164, 165);
        }

        /* TEAM PASSION */
        .profile-container.TeamPassion .info-box {
            background: rgb(255, 245, 235);
            border: 2px solid rgb(246, 146, 32);
        }

        /* TRAINEE */
        .profile-container.Trainee .info-box {
            background: rgb(255, 250, 196);
            border: 2px solid rgb(196, 120, 120);
        }

        /* VIRTUAL */
        .profile-container.Virtual .info-box {
            background: rgb(225, 225, 255);
            border: 2px solid rgb(3, 70, 192);
        }

        .member-gen-text {
            font-size: 15px;
            color: #000000;
            margin-top: -20px;
            margin-bottom: 15px;
            opacity: 0;
            animation: fadeSlideUp 0.5s ease forwards;
            animation-delay: 0.5s;
            letter-spacing: 3px;
            text-align: center;
        }

        .status-aktif {
            color: #00c103;
        }

        .status-hiatus {
            color: #ff9800;
        }

        .status-suspended {
            color: #000000;
        }

        .status-grad {
            color: #ff348c;
        }

        .member-nickname {
            font-size: 20px; 
            margin-left: 10px;
            font-family: 'Insanibu', sans-serif;
            letter-spacing: 3px;
        }

        @keyframes fadeSlideUp {
            0% {
                opacity: 0;
                transform: translateY(40px) scale(0.96);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes slideFromLeft {
            0% {
                opacity: 0;
                transform: translateX(-80px) scale(0.9);
            }
            100% {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }
                
        #muteBtn {
            font-size: 16px;
            transition: transform 0.2s ease;
        }

        #muteBtn:hover {
            transform: scale(1.2);
        }

        .inner-grid {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 10px;
        }

        .mini-card {
            width: clamp(110px, 28vw, 140px);
            background: #ffffff;
            border-radius: 10px;
            padding: 14px 10px 10px;
            text-align: center;
            box-shadow: 0 3px 8px rgba(0,0,0,1);
            transition: transform 0.2s ease;
            position: relative;
            margin-top: 10px;
            margin-bottom: 25px;
        }

        .mini-card-badges {
            position: absolute;
            top: -6px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            width: max-content;
            white-space: nowrap;
            pointer-events: none;
        }

        .mini-card:hover {
            transform: scale(1.05);
        }

        .mini-card p {
            margin: 0;
            font-size: 12px;
            color: rgb(0, 0, 0);
        }

        .mini-card span {
            font-size: 11px;
            line-height: 1.35;
            display: block;
            margin-top: 5px;
        }

        .partisipasi-list {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .partisipasi-group {
            width: 100%;
            text-align: center;
            margin-top: 54px;
        }

        .partisipasi-group:first-child {
            margin-top: 8px;
        }

        .partisipasi-group .inner-grid {
            margin-top: 18px; 
        }

        .partisipasi-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 999px;
            color: #ffffff;
            font-size: 13px;
            letter-spacing: 1px;
            box-shadow: 0 3px 8px rgba(0,0,0,1);
            margin-top: 18px;
            border: 3px solid #ffffff !important;
        }

        .center-badge {
            background: linear-gradient(90deg, #ff5e00, #ffc400);;
        }

        .undergirls-badge {
            background: linear-gradient(90deg, #8400ff, #ff43e0);
        }

        .double-center-badge {
            background: linear-gradient(90deg, #00b01a, #b1d400);
        }

        .center-badge,
        .undergirls-badge,
        .double-center-badge  {
            display: inline-block;
            position: static;
            transform: none;
            padding: 4px 9px;
            border-radius: 999px;
            color: #ffffff;
            border: 2.5px solid #ffffff;
            font-size: 10px;
            letter-spacing: 1px;
            line-height: 1;
            box-shadow: 0 2px 6px rgba(0,0,0,1);
            white-space: nowrap;
        }

        .badge-senbatsu {
            background: linear-gradient(90deg, #ff2ddc, #e20514);
        }

        .badge-coupling {
            background: linear-gradient(90deg, #ff43e0, #8400ff);
        }

        .badge-digital {
            background: linear-gradient(90deg, #00aaff, #0004ff);
        }

        .badge-setlist {
            background: linear-gradient(90deg, #ffc400, #ff5e00);
        }

        .partisipasi-group .inner-grid {
            margin-top: 12px;
        }

        .partisipasi-senbatsu .mini-photo {
            border-color: #e20514;
        }

        .partisipasi-coupling .mini-photo {
            border-color: #8400ff;
        }

        .partisipasi-digital .mini-photo {
            border-color: #0004ff;
        }

        .partisipasi-setlist .mini-photo {
            border-color: #ff5e00;
        }

        @media (max-width: 700px) {
            .profile-container {
                padding: 20px;
                width: 90%;
            }

            .photo-frame,
            .box-photo {
                width: 210px;
            }

            .photo-frame {
                height: 210px;
            }

            .profile-info {
                grid-template-columns: 1fr;
            }

            .info-box.full,
            .double-row,
            .debut-social {
                grid-column: span 1;
            }

            .double-row {
                grid-template-columns: 1fr;
            }

            .member-nickname {
                display: block;
                margin-left: 0;
                margin-top: 6px;
            }
        }


    </style>
</head>

<div class="page">
    <div id="profile-wrapper"></div>

<audio id="bgm" loop></audio>

<script>

function setBackground(team) {

    const backgrounds = {
        "TeamLove": "Backgrounds/Love.png",
        "TeamDream": "Backgrounds/Dream.png",
        "TeamPassion": "Backgrounds/Passion.png",
        "Trainee": "Backgrounds/Trainee.png",
        "Virtual": "Backgrounds/Virtual.png"
    };

    const bg = backgrounds[team] || "Backgrounds/Love.png";

    document.body.style.backgroundImage = `url("${bg}")`;
}

function getGenNumber(gen) {
    return parseInt(gen.replace(/[^0-9]/g, ""));
}

function getTeamLabel(team) {
    if (team === "TeamLove") return "Team Love";
    if (team === "TeamDream") return "Team Dream";
    if (team === "TeamPassion") return "Team Passion";
    if (team === "Trainee") return "Trainee";
    if (team === "Virtual") return "Virtual";
    return team;
}

function getGenDescription(genNumber) {
    const sameGenMembers = members.filter(m => 
        getGenNumber(m.gen) === genNumber
    );

    if (sameGenMembers.length === 1) {
        return `member terakhir dari generasi ${genNumber}`;
    } else {
        return `salah satu member dari generasi ${genNumber}`;
    }
}

const params = new URLSearchParams(window.location.search);
const name = decodeURIComponent(params.get("name") || "");

const member = members.find(m => 
    m.name.toLowerCase() === name.toLowerCase() ||
    m.nickname.toLowerCase() === name.toLowerCase()
);

if (!name || !member) {
    console.warn("Member tidak ditemukan atau param kosong:", name);
    window.location.href = "members.html";
}

if (member) {
    document.title = `Profile (${member.team}) ${member.name} | JKT48`;
}

if (member) {
    setBackground(member.team);
    setBGM(member.team, member.gen);
}

function getStatus(member) {
    if (!member.status) return "Aktif";

    if (member.status === "Graduation") {
        return "Aktif (Grad Annouced)";
    }
    return member.status;
}

function getStatusClass(status) {
    switch (status) {
        case "Hiatus":
            return "status-hiatus";
        case "Suspended":
            return "status-suspended";
        case "Aktif (Grad Annouced)":
            return "status-grad";
        default:
            return "status-aktif";
    }
}

function normalizeName(text) {
    return String(text || "").trim().toLowerCase();
}

function isMemberInList(list, nickname) {
    return Array.isArray(list) && list.some(name =>
        normalizeName(name) === normalizeName(nickname)
    );
}

function buildPartisipasiFromSongs(songs) {
    const result = {};

    songs.forEach(song => {
        song.members.forEach(nickname => {
            const member = members.find(m =>
                normalizeName(m.nickname) === normalizeName(nickname)
            );

            if (!member) {
                console.warn("Nickname member tidak ditemukan:", nickname, "di lagu:", song.value);
                return;
            }

            if (!result[member.name]) {
                result[member.name] = [];
            }

            result[member.name].push({
                img: song.img,
                label: song.label,
                value: song.value,
                category: song.category,
                center: isMemberInList(song.center, member.nickname),
                doublecenter: isMemberInList(song.doublecenter, member.nickname),
                undergirls: song.undergirls === true || isMemberInList(song.undergirls, member.nickname)
            });
        });
    });

    return result;
}

const partisipasiMiniCardByMember = buildPartisipasiFromSongs(songsParticipation);

function renderMiniCards(cards, options = {}) {
    const showTitle = options.showTitle !== false;

    return cards.map(card => `
        <div class="mini-card">
            ${(card.center || card.undergirls || card.doublecenter) ? `
                <div class="mini-card-badges">
                    ${card.center ? `<div class="center-badge">Center</div>` : ""}
                    ${card.undergirls ? `<div class="undergirls-badge">Undergirls</div>` : ""}
                    ${card.doublecenter ? `<div class="double-center-badge">Double Center</div>` : ""}
                </div>
            ` : ""}

            <div class="mini-photo">
                <img src="${card.img}">
            </div>

            ${showTitle ? `<p>${card.title || card.label || ""}</p>` : ""}
            <span>${card.value}</span>
        </div>
    `).join("");
}

function getGenDebutYear(gen) {
    const genNumber = getGenNumber(gen);

    const match = debut.match(/\d{4}/);

}

function getDefaultRiwayatCards(member) {

}

function getPartisipasiCategory(card) {
    if (card.category) return card.category;

    const label = (card.label || card.title || "").toLowerCase();

    if (label.includes("coupling")) return "coupling";
    if (label.includes("digital")) return "digital";
    if (label.includes("album") || label.includes("setlist") || label.includes("special")) return "setlist";
    if (label.includes("senbatsu") || label.includes("single")) return "senbatsu";

    return "setlist";
}

function renderPartisipasiMiniCards(cards) {
    const groupedCards = partisipasiCategories.map(category => {
        const items = cards.filter(card => getPartisipasiCategory(card) === category.key);

        if (!items.length) return "";

        return `
            <div class="partisipasi-group partisipasi-${category.key}">
                <div class="partisipasi-badge ${category.badgeClass}">
                    ${category.label}
                </div>

                <div class="inner-grid">
                    ${renderMiniCards(items, { showTitle: false })}
                </div>
            </div>
        `;
    }).join("");

    return groupedCards || `<span>Coming Soon</span>`;
}

function getGenColor(gen) {
    const number = parseInt(gen.replace(/[^0-9]/g, ""));

    const colors = {
        1: "#0346c0",
        2: "#0346c0",
        3: "#ff69b4",
        6: "#90ee90",
        7: "#7fff00",
        8: "#44a7cb",
        9: "#44a7cb",
        10: "#00bfff",
        11: "#ed7014",
        12: "#ddc7a0",
        13: "#ffed29",
        14: "#4c3674"
    };

    return colors[number] || "#000000";
}

window.onerror = function(msg) {
    console.log("ERROR:", msg);
};

function navigateWithTransition(url) {
    const transition = document.getElementById("pageTransition");

    transition.style.opacity = "1";
    transition.style.pointerEvents = "all";

    setTimeout(() => {
        window.location.href = url;
    }, 400);
}

window.addEventListener("load", () => {
    const transition = document.getElementById("pageTransition");
    if (transition) {
        transition.style.opacity = "0";
    }

    const bgm = document.getElementById("bgm");
    const btn = document.getElementById("muteBtn");

    const savedMute = localStorage.getItem("bgmMuted") === "true";

    bgm.muted = savedMute;
    btn.textContent = savedMute ? "🔇" : "🔊";
});

function renderAllMembers() {

}

function setBGM(team, gen) {

    const sounds = {
        "TeamLove": "Musik/TeamLove.mp3",
        "TeamDream": "Musik/TeamDream.mp3",
        "TeamPassion": "Musik/TeamPassion.mp3",
        "Trainee": "Musik/Trainee.mp3",
        "Virtual_Gen1": "Musik/Virtual.mp3",
        "Virtual_Gen2": "Musik/Virtual2.mp3"
    };

    let key = team;

    if (team === "Virtual") {
        const genNumber = parseInt(gen.replace(/[^0-9]/g, ""));

        if (genNumber === 1) {
            key = "Virtual_Gen1";
        } else if (genNumber === 2) {
            key = "Virtual_Gen2";
        }
    }

    const bgm = document.getElementById("bgm");

    if (!sounds[key]) return;

    const newSrc = location.origin + "/" + sounds[key];

    if (bgm.src !== newSrc) {
        bgm.src = sounds[key];
        bgm.volume = 0.4;

        bgm.play().catch(() => {
            console.log("Autoplay diblokir browser");
        });
    }
}

document.body.addEventListener("click", () => {
    const bgm = document.getElementById("bgm");
    if (bgm.paused) bgm.play();
});

function toggleMute() {
    const bgm = document.getElementById("bgm");
    const btn = document.getElementById("muteBtn");

    bgm.muted = !bgm.muted;

    if (bgm.muted) {
        btn.textContent = "🔇";
    } else {
        btn.textContent = "🔊";
    }

    // simpan status ke localStorage
    localStorage.setItem("bgmMuted", bgm.muted);
}

function getZodiac(dateStr) {
    const date = new Date(dateStr);
    const d = date.getDate();
    const m = date.getMonth() + 1;

    if ((m==1 && d>=20) || (m==2 && d<=18)) return "Aquarius";
    if ((m==2 && d>=19) || (m==3 && d<=20)) return "Pisces";
    if ((m==3 && d>=21) || (m==4 && d<=19)) return "Aries";
    if ((m==4 && d>=20) || (m==5 && d<=20)) return "Taurus";
    if ((m==5 && d>=21) || (m==6 && d<=20)) return "Gemini";
    if ((m==6 && d>=21) || (m==7 && d<=22)) return "Cancer";
    if ((m==7 && d>=23) || (m==8 && d<=22)) return "Leo";
    if ((m==8 && d>=23) || (m==9 && d<=22)) return "Virgo";
    if ((m==9 && d>=23) || (m==10 && d<=22)) return "Libra";
    if ((m==10 && d>=23) || (m==11 && d<=21)) return "Scorpio";
    if ((m==11 && d>=22) || (m==12 && d<=21)) return "Sagittarius";
    return "Capricorn";
}

function formatTanggal(dateStr) {
    const date = new Date(dateStr);

    return date.toLocaleDateString("id-ID", {
        day: "numeric",
        month: "long",
        year: "numeric"
    });
}
