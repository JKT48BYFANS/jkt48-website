            function updateSummary() {

                const totalSemua = members.length;

                const totalInti = members.filter(m =>
                    m.team === "TeamLove" ||
                    m.team === "TeamDream" ||
                    m.team === "TeamPassion"
                ).length;

                const totalTrainee = members.filter(m => m.team === "Trainee").length;

                const totalVirtual = members.filter(m => m.team === "Virtual").length;

                document.getElementById("summaryMember").innerHTML = `
                    Semua Member : <span style="color:#00c103">${totalSemua}</span> &nbsp; | &nbsp;
                    Member Inti : <span style="color:#e20514">${totalInti}</span> &nbsp; | &nbsp;
                    Trainee : <span style="color:rgb(196, 120, 120)">${totalTrainee}</span> &nbsp; | &nbsp;
                    Member Virtual : <span style="color:rgb(3, 70, 192)">${totalVirtual}</span>
                `;
            }

            function renderMembers(filter = "SemuaMember") {
                grid.innerHTML = "";

                if (filter === "SemuaMember") {

                    // ================= NON TRAINEE =================
                    let nonTrainee = members.filter(m => m.team !== "Trainee");

                    // urutkan abjad
                    nonTrainee.sort((a, b) => a.name.localeCompare(b.name));

                    // 🔥 paksa Freya ke paling atas
                    const freyaIndex = nonTrainee.findIndex(m => m.name === "Freya Jayawardana");
                    if (freyaIndex > -1) {
                        const freya = nonTrainee.splice(freyaIndex, 1)[0];
                        nonTrainee.unshift(freya);
                    }

                    // render non trainee
                    renderSection(nonTrainee);

                    // ================= TRAINEE (SECTION BARU) =================
                    const trainee = members.filter(m => m.team === "Trainee");

                    // judul trainee
                    const title = document.createElement("div");
                    grid.appendChild(title);

                    renderSection(trainee);

                } else {
                    const list = members.filter(m => m.team === filter);
                    renderSection(list);
                }
            }

            function renderSection(list) {
                let count = 0;

                list.forEach(member => {

                    const card = document.createElement("div");
                    let genClass = "";

                    if (member.team === "Trainee") {
                        if (member.gen.includes("13")) genClass = "gen13";
                        if (member.gen.includes("14")) genClass = "gen14";
                    }

                    let statusClass = "";

                    if (member.status === "Hiatus") statusClass = "status-hiatus";
                    else if (member.status === "Suspended") statusClass = "status-suspended";
                    else if (member.status === "Graduation") statusClass = "status-graduation";

                    card.className = `member-card ${member.team} ${genClass} ${statusClass}`;

                    let isAnnounced = 
                        member.name === "Cathleen Nixie" || 
                        member.name === "Chelsea Davina";

                    let isHiatus =     
                        member.name === "Feni Fitriyanti" ||
                        member.name === "Sami Maono";

                    let isSuspended =     
                        member.name === "Gendis Mayrannisa";

                    let isKaptenJKT48 =
                        member.name === "Freya Jayawardana"

                    card.innerHTML = `    

                        ${isAnnounced ? `<div class="card-badge">🎓</div>` : ""}
                        ${isHiatus ? `<div class="card-badge">⏸️</div>` : ""}
                        ${isSuspended ? `<div class="card-badge">🚫</div>` : ""}
                        ${isKaptenJKT48 ? `<div class="card-badge">🏅</div>`:""}

                        <div class="photo-frame">
                            <img class="member-photo" src="${member.photo}" alt="${member.name}">
                            
                            ${isAnnounced ? `<div class="announced-badge">GRADUATION ANNOUNCEMENT</div>` : ""}
                            ${isHiatus ? `<div class="announced-badge">HIATUS</div>` : ""}
                            ${isSuspended ? `<div class="announced-badge">SUSPENDED</div>` : ""}

                            ${isKaptenJKT48 ? `<div class="Kapten-badge">KAPTEN JKT48</div>` : ""}  
                        </div>

                        <div class="member-name">${member.name}</div>
                        <div class="member-gen">${member.gen}</div>
                    `;
                    card.onclick = () => {

                        const team = member.team;

                        localStorage.setItem("selected_team", team);

                        const nama = encodeURIComponent(member.name);

                        openProfile(nama, card);
                    };

                    card.style.animationDelay = `${count * 0.05}s`;

                    grid.appendChild(card);

                    setTimeout(() => {
                        card.classList.add("show");
                    }, 10);

                    count++;
                });
            }

            function openProfile(nama, card) {
            const transition = document.getElementById("pageTransition");

                card.style.transition = "all 0.4s ease";
                card.style.transform = "scale(1.2)";
                card.style.zIndex = "999";

                transition.style.opacity = "1";

                setTimeout(() => {
                    window.location.href = `ProfileMember.html?name=${nama}`;
                }, 400);
            }
            
            renderMembers();
            updateSummary();
            updateStatusSummary();
            
            function updateStatusSummary() {
                const hiatus = members.filter(m => m.status === "Hiatus").length;
                const suspended = members.filter(m => m.status === "Suspended").length;

                // GRADUATION tetap dihitung sebagai AKTIF
                const active = members.length - hiatus - suspended;

                const graduation = members.filter(m => m.status === "Graduation").length;

                document.getElementById("summaryStatus").innerHTML = `
                    Aktif : <span style="color:#00c103">${active}</span> &nbsp; | &nbsp;
                    Hiatus : <span style="color:#ff9800">${hiatus}</span> &nbsp; | &nbsp;
                    Suspended : <span style="color:#000000">${suspended}</span> &nbsp; | &nbsp;
                    Graduation Announcement : <span style="color:#ff348c;">${graduation}</span>
                `;
            }
            
            const filters = document.querySelectorAll(".filter");

            const audio = document.getElementById("bgMusic");
            audio.volume = 0.05; // 0.0 - 1.0

            const musicMap = {
            "SemuaMember": [
                "Musik/SemuaMember.mp3",
            ],
            "TeamLove": [
                "Musik/TeamLove.mp3",
            ],
            "TeamDream": [
                "Musik/TeamDream.mp3",
            ],
            "TeamPassion": [
                "Musik/TeamPassion.mp3",
            ],
            "Trainee": [
                "Musik/Trainee.mp3",
            ],
            "Virtual": [
                "Musik/Virtual.mp3",
                "Musik/Virtual2.mp3"
            ]
        };

            let currentPlaylist = [];
            let currentTrack = 0;

            function playMusic(playlist) {
                currentPlaylist = playlist;
                currentTrack = 0;
                playTrack();
            }

            function playTrack() {
                if (!currentPlaylist.length) return;

                audio.src = currentPlaylist[currentTrack];
                audio.play().catch(() => {
                    console.log("Autoplay diblokir browser");
                });
            }

            audio.addEventListener("ended", () => {
                setTimeout(() => {
                    currentTrack++;
                    if (currentTrack >= currentPlaylist.length) {
                        currentTrack = 0;
                    }
                    playTrack();
                }, 200);
            });
            
            window.addEventListener("DOMContentLoaded", () => {

                window.scrollTo({ top: 0, behavior: "instant" });
                document.body.classList.add("bg-semua");
                document.body.classList.add("mode-semua");

                const savedFilter = "SemuaMember";
                    localStorage.setItem("music_filter", "SemuaMember");
                const savedMuted = localStorage.getItem("music_muted") === "true";

                if (musicMap[savedFilter]) {
                    playMusic(musicMap[savedFilter]);

                    audio.volume = 0.05;
                    audio.muted = savedMuted;

                }
            });
            
            filters.forEach(btn => {
                btn.addEventListener("click", () => {

                    window.scrollTo({
                    top: 0,
                    behavior: "smooth"
                    });

                    filters.forEach(b => b.classList.remove("active"));
                    btn.classList.add("active");
                    
                    grid.classList.remove("fade-in");
                    grid.classList.remove("fade-out");
                    
                    void grid.offsetWidth;
                    
                    grid.classList.add("fade-out");

                    setTimeout(() => {
                        
                        renderMembers(btn.dataset.filter);

                        const selected = btn.dataset.filter;

                        if (musicMap[selected]) {
                        if (JSON.stringify(currentPlaylist) !== JSON.stringify(musicMap[selected])) {
                            playMusic(musicMap[selected]);
                        }
                            audio.volume = 0.1;
                            audio.muted = isMuted;
                            localStorage.setItem("music_filter", selected);
                        }
                        
                        document.body.classList.remove(
                            "bg-semua",
                            "bg-love",
                            "bg-dream",
                            "bg-passion",
                            "bg-trainee",
                            "bg-virtual"
                        );

                        document.body.classList.remove("mode-semua");

                        switch (selected) {
                            case "TeamLove":
                                document.body.classList.add("bg-love");
                                break;
                            case "TeamDream":
                                document.body.classList.add("bg-dream");
                                break;
                            case "TeamPassion":
                                document.body.classList.add("bg-passion");
                                break;
                            case "Trainee":
                                document.body.classList.add("bg-trainee");
                                break;
                            case "Virtual":
                                document.body.classList.add("bg-virtual");
                                break;
                            default:
                                document.body.classList.add("bg-semua");
                                document.body.classList.add("mode-semua");
                        }

                        grid.classList.remove("fade-out");
                        void grid.offsetWidth;
                        
                        grid.classList.add("fade-in");

                    }, 350);
                });
            });

            const pageMap = {
                "Home.html": "home",
                "News.html": "news",
                "Schedule.html": "schedule",
                "Songs.html": "songs",
                "Theater.html": "theater",
                "MemberJKT48.html": "member",
                "Sister.html": "sister"
            };

            const currentPage = window.location.pathname.split("/").pop();

            const activePage = pageMap[currentPage];

            if (activePage) {
                document.querySelectorAll(".header-btn").forEach(btn => {
                    if (btn.dataset.page === activePage) {
                        btn.classList.add("active");
                    }
                });
            }

            function openWithDelay() {
            setTimeout(() => {
                window.open("https://rh26.jkt48.com");
            }, 800);
            }
            
            let isMuted = false;
                const muteBtn = document.getElementById("muteBtn");

            function toggleMute() {
                isMuted = !isMuted;

                audio.muted = isMuted;
                localStorage.setItem("music_muted", isMuted);

                muteBtn.textContent = isMuted ? "🔇" : "🔊";
            }

            let hasInteracted = false;

            document.addEventListener("click", () => {
                if (!hasInteracted) {
                    hasInteracted = true;

                    if (musicMap["SemuaMember"]) {
                        currentPlaylist = musicMap["SemuaMember"];
                        currentTrack = 0;

                        audio.src = currentPlaylist[0];
                        audio.play().catch(()=>{});
                    }
                }
            });

            function goBackMenu() {
            const transition = document.getElementById("pageTransition");

                transition.style.opacity = "1";

                localStorage.setItem("openMenu", "true");

                setTimeout(() => {
                    window.location.href = "Menu.html";
                }, 400);
            }
