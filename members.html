<!DOCTYPE html>
<html>
    <head>

        <title>Member JKT48</title>

        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <style>

            @font-face {
                font-family: 'Insanibu';
                src: url('Fonts/Insanibu.ttf') format('truetype');
            }

            @font-face {
                font-family: 'Insanibc';
                src: url('Fonts/Insanibc.ttf') format('truetype');
            }

            body {
                margin: 0;
                font-family: 'Insanibu', sans-serif;
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                background-attachment: fixed;
                max-width: 100%;
                overflow-x: hidden;
            }

            .page {
                display: flex;
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
                            
            .top-header {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                background: linear-gradient(90deg, #e20785 15%, #f69220 50%, #e20514);
                padding: 20px 0;
                z-index: 1000;
                display: flex;
                justify-content: center;
                align-items: center;
                box-shadow: 0 5px 10px rgba(0,0,0,1);
                gap: 10px;
            }

            .header-left {
                position: absolute;
                left: 15px;
            }

            .header-right {
                position: absolute;
                right: 15px;
                display: flex;
                gap: 10px;
            }

            .header-content {
                position: absolute;
                left: 50%;
                transform: translateX(-50%);
                color: #ffffff;
                font-size: 50px;
            }

            .header-btn {
                padding: 5px 10px;
                font-size: 15px;
                background-color: #ffffff;
                color: #e20514;
                border: 3px solid #e20514;
                border-radius: 10px;
                cursor: pointer;    
                font-family: 'Insanibc', sans-serif;
            }

            .header-btn:hover {
                background-color: #e20514;
                color: white; 
            }

            .header-btn.active {
                background-color: #e20514;
                color: white;
                border: 3px solid white;
                transform: scale(1.05);
                cursor: default;
                pointer-events: none;
            }

            .header-section {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 8px;
                position: relative;
                z-index: 10;
                overflow: visible;
            }

            .content {
                margin-top: 85px; 
                text-align: center;
                position: relative;
            }
            
            @keyframes cardIn {
                0% {
                    opacity: 0;
                    transform: translateY(70px) scale(0.86);
                    filter: blur(10px);
                }

                55% {
                    opacity: 1;
                    transform: translateY(-8px) scale(1.025);
                    filter: blur(1px);
                }

                100% {
                    opacity: 1;
                    transform: translateY(0) scale(1);
                    filter: blur(0);
                }
            }
        
            .title {
                font-size: 25px;
                margin-top: 10px;
                margin-bottom: 1px;
                color: #000000;
                letter-spacing: 2px;
                font-family: 'Insanibu', sans-serif;
            }

            .main-title {
                font-size: 50px;
                color: #e20514;
                margin-top: 1px;
                margin-bottom: 5px;
                margin-left: 10px;
                margin-right: 10px;
                letter-spacing: 1px;
                font-family: 'Insanibc', sans-serif;
            }

            .title-box {
                background: rgba(255, 255, 255);
                padding: 5px 10px;
                border-radius: 10px;
                display: inline-block;
                box-shadow: 
                    0 10px 25px rgba(0,0,0,0.25),
                    0 20px 50px rgba(0,0,0,0.15);
                margin-top: 65px;
                margin-bottom: auto;
                border: 1px solid #000000;
                transition: all 0.3s ease;
                box-shadow: 0 5px 10px rgba(0,0,0,1);
            }

            .team-title {
                grid-column: 1 / -1;
                text-align: center;
                font-size: 25px;
                padding: 10px 20px;
                margin: 25px 0 10px 0;
                border-radius: 12px;
                letter-spacing: 2px;
                border: 2px solid black;
                background: white;
                box-shadow: 0 5px 12px rgba(0,0,0,0.25);
                transition: 0.3s;
            }

            .team-title:hover {
                transform: scale(1.03);
                box-shadow: 0 8px 18px rgba(0,0,0,0.35);
            }

            .team-title.TeamLove {
                background: rgb(255, 235, 245);
                border-color: rgb(226, 7, 133);
                color: rgb(226, 7, 133);
            }

            .team-title.TeamDream {
                background: rgb(225, 255, 255);
                border-color: rgb(0, 164, 165);
                color: rgb(0, 164, 165);
            }

            .team-title.TeamPassion {
                background: rgb(255, 245, 235);
                border-color: rgb(246, 146, 32);
                color: rgb(246, 146, 32);
            }

            .team-title.Trainee {
                background: rgb(255, 250, 196);
                border-color: rgb(196, 120, 120);
                color: rgb(196, 120, 120);
            }

            .team-title.Virtual {
                background: rgb(225, 225, 255);
                border-color: rgb(3, 70, 192);
                color: rgb(3, 70, 192);
            }

            .profile-summary {
                background: rgba(255, 255, 255, 0.95);
                padding: 10px 20px;
                border-radius: 15px;
                border: 1px solid #000;
                box-shadow: 0 5px 10px rgba(0,0,0,1);
                margin-bottom: 15px;
                display: inline-block;
                transition: 0.3s;
            }

            .summary-line {
                font-size: 14px;
                color: #333;
                white-space: nowrap;
                letter-spacing: 2.5px;
            }
                        
            .filter-sticky-area {
                position: fixed;
                top: 70px;
                left: 0;
                width: 100%;
                z-index: 999;
                display: flex;
                justify-content: center;
                pointer-events: none;
            }

            .filter-wrapper {
                position: relative;
                z-index: 999;
                display: flex;
                justify-content: center;
                flex-wrap: wrap;
                gap: 14px;
                margin: auto;
                padding: 15px 20px;
                background: rgba(255,255,255,1);
                backdrop-filter: blur(6px);
                border-radius: 10px;
                box-shadow: 0 6px 15px rgba(0,0,0,1);
                width: fit-content;
                pointer-events: auto;
            }

            .filter {
                padding: 10px 22px;
                border-radius: 500px;
                border: 3px solid;
                background: white;
                cursor: pointer;
                transition: 0.25s ease;
                font-family: 'Insanibc', sans-serif;
                letter-spacing: 1.5px;
                margin: auto;
            }

            .filter.active {
                color: #ffffff;
                transform: scale(1.05);
            }

            .filter:hover {
                color: white;
                transform: scale(1.07);
                box-shadow: 0 6px 12px rgba(0,0,0,0.2);
            }


            [data-filter="SemuaMember"] {
                border-color: #e20514;
                color: #e20514;
            }
            
            [data-filter="SemuaMember"].active {
                background: #e20514;
                border-color: white;
            }

            [data-filter="TeamLove"] {
                border-color: rgb(226, 7, 133);
                color: rgb(226, 7, 133);
            }

            [data-filter="TeamLove"].active {
                background: rgb(226, 7, 133);
                border-color: white;
            }

            [data-filter="TeamDream"] {
                border-color: rgb(0, 164, 165);
                color: rgb(0, 164, 165);
            }

            [data-filter="TeamDream"].active {
                background: rgb(0, 164, 165);
                border-color: white;
            }

            [data-filter="TeamPassion"] {
                border-color: rgb(246, 146, 32);
                color: rgb(246, 146, 32);
            }

            [data-filter="TeamPassion"].active {
                background: rgb(246, 146, 32);
                border-color: white;
            }

            [data-filter="Trainee"] {
                border-color: rgb(196, 120, 120);
                color: rgb(196, 120, 120);
            }

            [data-filter="Trainee"].active {
                background: rgb(196, 120, 120);
                border-color: white;
            }

            [data-filter="Virtual"] {
                border-color: rgb(3, 70, 192);
                color: rgb(3, 70, 192);
            }

            [data-filter="Virtual"].active {
                background: rgb(3, 70, 192);
                border-color: white;
            }

            [data-filter="SemuaMember"]:hover {
                background: #e20514;
                border-color: rgb(255, 255, 255);
            }

            [data-filter="TeamLove"]:hover {
                background: rgb(226, 7, 133);
                border-color: rgb(255, 255, 255);
            }

            [data-filter="TeamDream"]:hover {
                background: rgb(0, 164, 165);
                border-color: rgb(255, 255, 255);
            }

            [data-filter="TeamPassion"]:hover {
                background: rgb(246, 146, 32);
                border-color: rgb(255, 255, 255);
            }

            [data-filter="Trainee"]:hover {
                background: rgb(196, 120, 120);
                border-color: rgb(255, 255, 255);
            }

            [data-filter="Virtual"]:hover {
                background: rgb(3, 70, 192);
                border-color: rgb(255, 255, 255);
            }

            .member-grid{
                display: grid;
                grid-template-columns: repeat(5, 1fr);
                gap: 30px;
                padding: 20px 50px 50px 50px;
                justify-items: center;
                grid-auto-flow: row;
                justify-content: center;
                opacity: 1;
                transform: translateY(0);
            }
                        
            .member-grid.fade-in {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
                transition:
                    opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1),
                    transform 0.6s cubic-bezier(0.16, 1, 0.3, 1),
                    filter 0.6s ease;
            }

            .member-grid.fade-out {
                opacity: 0;
                transform: translateY(25px) scale(0.985);
                filter: blur(5px);
                transition:
                    opacity 0.35s ease,
                    transform 0.35s ease,
                    filter 0.35s ease;
            }

            .member-card {
                width: 200px;
                min-height: 240px;
                border-radius: 16px;
                padding: 20px 14px;
                text-align: center;
                border: 3px solid #e20514;
                box-shadow: 0 6px 16px rgba(0,0,0,0.35);
                transition:
                    transform 0.45s cubic-bezier(0.22, 1, 0.36, 1),
                    box-shadow 0.45s ease,
                    filter 0.45s ease;
                display: flex;
                flex-direction: column;
                align-items: center;
                background: #ffffff;
                opacity: 0;
                transform: translateY(45px) scale(0.92);
                cursor: pointer;
                margin-bottom: 15px;
                position: relative;
                will-change: transform, opacity;
                backface-visibility: hidden;
            }

            .member-card:hover {
                transform: translateY(-10px) scale(1.04);
                box-shadow:
                    0 14px 30px rgba(0,0,0,0.28),
                    0 8px 18px rgba(0,0,0,0.18);
                filter: brightness(1.02);
            }

            .member-card.show {
                animation: cardIn 0.95s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            }

            .member-name {
                font-size: 14.90px;
                margin-top: 20px;
                margin-bottom: 10px;
                color: #e20514;
                letter-spacing: 2px;
            }

            .member-gen {
                background: #e20514;
                color: white;
                font-size: 12px;
                padding: 4px 10px;
                border-radius: 999px;
                display: inline-block;
                margin-bottom: 5px;
            }

            .member-photo {
                width: auto;
                height: 224.75px;
                object-fit: cover;
                box-shadow: 0 6px 12px rgba(0,0,0,1);

                opacity: 0;
                transform: scale(1.08) translateY(10px);
                animation: photoIn 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            }

            @keyframes photoIn {
                0% {
                    opacity: 0;
                    transform: scale(1.08) translateY(10px);
                    filter: blur(5px);
                }

                100% {
                    opacity: 1;
                    transform: scale(1) translateY(0);
                    filter: blur(0);
                }
            }

            .member-card.empty {
                visibility: hidden;
            }
            
            .profile-btn {
                margin-top: 20px;
                padding: 8px 12px;
                font-size: 12px;
                border-radius: 8px;
                border: none;
                background: #e20514;
                color: white;
                cursor: pointer;
                transition: 0.25s;
            }

            .profile-btn:hover {
                background: #b8000f;
                transform: scale(1.05);
            }

            .card-badge {
                position: absolute;
                top: -25px;
                left: 50%;
                transform: translateX(-50%);
                font-size: 50px;
                z-index: 2;
            }

                /* TEAM LOVE COLOR */
            .TeamLove .member-photo {
                border-color: rgb(226, 7, 133);
            }

            .TeamLove .member-name {
                color: rgb(226, 7, 133);
            }

            .TeamLove .member-gen {
                background: rgb(226, 7, 133);
            }

            .member-card.TeamLove {
                background: rgb(255, 206, 231);
                border-color: rgb(226, 7, 133);
            }

            .TeamLove .profile-btn {
                background: rgb(226, 7, 133);
            }

            .TeamLove .profile-btn:hover {
                background: rgb(180, 0, 100);
            }

                /* TEAM DREAM COLOR */
            .TeamDream .member-photo {
                border-color: rgb(0, 164, 165);
            }

            .TeamDream .member-name {

            }

            .TeamDream .member-gen {

            }

            .member-card.TeamDream {
                background: rgb(203, 255, 255);
                border-color: rgb(0, 164, 165);
            }

            .TeamDream .profile-btn {
                background: rgb(0, 164, 165);
            }

            .TeamDream .profile-btn:hover {

            }

            /* TEAM PASSION COLOR */
            .TeamPassion .member-photo {

            }

            .TeamPassion .member-name {

            }

            .TeamPassion .member-gen {
                background: rgb(246, 146, 32);
            }

            .member-card.TeamPassion {
                background: rgb(255, 226, 196);
                border-color: rgb(246, 146, 32);
            }

            .TeamPassion .profile-btn {
                background: rgb(246, 146, 32);
            }

            .TeamPassion .profile-btn:hover {
                background: rgb(246, 146, 32);
            }

            /* ================= TRAINEE GEN 13 ================= */
            .member-card.Trainee.gen13 {
                background: rgb(255, 250, 196);

            }

            .Trainee.gen13 .member-name {
                color: rgb(196, 120, 120);
            }

            .Trainee.gen13 .member-gen {
                background: rgb(196, 120, 120);
            }

            .Trainee.gen13 .profile-btn {
                background: rgb(196, 120, 120);

            /* ================= TRAINEE GEN 14 ================= */
            .member-card.Trainee.gen14 {
                background: rgb(228, 214, 255);

            }
            
            .Trainee.gen14 .member-name {

            }    

            .Trainee.gen14 .member-gen {

            .Trainee.gen14 .profile-btn {

            }

            /* VIRTUAL COLOR */
            .Virtual .member-photo {
                border-color: rgb(3, 70, 192);
            }

            .Virtual .member-name {
                color: rgb(3, 70, 192);
            }

            .Virtual .member-gen {
                background: rgb(3, 70, 192);
            }

            .member-card.Virtual {
                background: rgb(188, 188, 255);
                border-color: rgb(3, 70, 192);
            }

            .Virtual .profile-btn {
                background: rgb(3, 70, 192);
            }

            .Virtual .profile-btn:hover {
                background: rgb(3, 70, 192);
            }
            
            body.bg-semua {
                background-image: url("Backgrounds/Background.jpg");
            }

            body.bg-love {
                background-image: url("Backgrounds/Love.jpg");
            }

            body.bg-dream {
                background-image: url("Backgrounds/Dream.jpg");
            }

            body.bg-passion {
                background-image: url("Backgrounds/Passion.jpg");
            }

            body.bg-trainee {
                background-image: url("Backgrounds/Trainee.jpg");
            }

            body.bg-virtual {
                background-image: url("Backgrounds/Virtual.jpg");
            }

            /* ================= MODE SEMUA MEMBER ================= */

            /* MEMBER INTI*/
            body.mode-semua .member-card.TeamLove,
            body.mode-semua .member-card.TeamDream,
            body.mode-semua .member-card.TeamPassion,
            body.mode-semua .member-card.Virtual {
                border-color: #e20514 !important;
            }

            body.mode-semua .TeamLove .member-name,
            body.mode-semua .TeamDream .member-name,
            body.mode-semua .TeamPassion .member-name,

                color: #e20514 !important;
            }

            body.mode-semua .TeamLove .profile-btn,
            body.mode-semua .TeamDream .profile-btn,
            body.mode-semua .TeamPassion .profile-btn,
            body.mode-semua .Virtual .profile-btn {
                background: #e20514 !important;
            }


            /* TRAINEE */
            body.mode-semua .member-card.Trainee {

            }

            }

            body.mode-semua .Trainee .member-gen {
                background: rgb(196, 120, 120);
            }

            body.mode-semua .Trainee .profile-btn {
                background: rgb(196, 120, 120);
            }

            #scrollTopBtn {
                position: fixed;
                bottom: 25px;
                right: 25px;
                width: auto;
                height: auto;
                font-size: 50px;
                cursor: pointer;
                z-index: 9999;
                background: transparent;
                border: none;
                box-shadow: none;
                opacity: 0;
                transform: translateY(20px);
                pointer-events: none;
                transition: opacity 0.5s ease, transform 0.5s ease;
            }

            #scrollTopBtn.show {
                opacity: 1;
                transform: translateY(0);
                pointer-events: auto;
                animation: floatBtn 2.5s ease-in-out infinite;
            }

            @keyframes floatBtn {
                0%   { transform: translateY(0px); }
                50%  { transform: translateY(-8px); }
                100% { transform: translateY(0px); }
            }

            #pageTransition {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgb(255, 255, 255);
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.5s ease;
                z-index: 99999;
            }

            .team-slogan-card {
                display: none;
                width: fit-content;
                max-width: Auto;
                margin: -10px auto auto auto;
                padding: 5px 15px;
                border-radius: 10px;
                background: white;
                border: 1.5px solid #e20514;
                box-shadow: 0 6px 15px rgba(0,0,0,1);
                text-align: center;
                transition: 0.3s ease;
            }

            .team-slogan-card.show {
                display: block;
                animation: sloganIn 0.35s ease forwards;
            }

            .team-slogan-text {
                font-size: 15px;
                letter-spacing: 2px;
                color: #333;
            }

            .team-slogan-card.TeamLove {
                border-color: rgb(226, 7, 133);
                background: rgb(255, 235, 245);
            }

            .team-slogan-card.TeamDream {
                border-color: rgb(0, 164, 165);
                background: rgb(225, 255, 255);
            }

            .team-slogan-card.TeamPassion {
                border-color: rgb(246, 146, 32);
                background: rgb(255, 245, 235);
            }

            @keyframes sloganIn {
                from {
                    opacity: 0;
                    transform: translateY(-10px) scale(0.95);
                }
                to {
                    opacity: 1;
                    transform: translateY(0) scale(1);
                }
            }

            .team-logo {
                position: absolute;
                top: 15px;
                width: 200px;
                height: 200px;
                object-fit: contain;
                z-index: 5;
                display: none;
                cursor: pointer;
                pointer-events: auto;
                filter: drop-shadow(0 6px 8px rgba(0,0,0,1));
                transition: transform 0.3s ease, filter 0.3s ease;
            }

            .team-logo:hover {
                transform: scale(1.14) rotate(4deg);
                filter: drop-shadow(0 10px 14px rgba(0,0,0,1));
            }

            .team-logo.show {
                display: block;
                animation: logoIn 0.35s ease forwards, logoPulse 2.4s ease-in-out infinite;
            }

            .team-logo.left {
                left: 50px;
            }

            .team-logo.right {
                right: 50px;
            }

            @keyframes logoIn {
                from {
                    opacity: 0;
                    transform: scale(0.6) rotate(-8deg);
                }

                to {
                    opacity: 1;
                    transform: scale(1) rotate(0deg);
                }
            }

            @keyframes logoPulse {
                0% {
                    transform: scale(1);
                    filter: drop-shadow(0 6px 8px rgba(0,0,0,1));
                }
                50% {
                    transform: scale(1.06);
                    filter: drop-shadow(0 9px 12px rgba(0,0,0,1));
                }
                100% {
                    transform: scale(1);
                    filter: drop-shadow(0 6px 8px rgba(0,0,0,1));
                }
            }

            .team-logos {
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 20px;
            }

            .team-logos img {
                width: 90px;
                height: 90px;
                object-fit: contain;
            }

            .mobile-menu-btn,
            .mobile-nav-panel {
                display: none;
            }

            .filter-menu-btn {
                display: none;
            }

/* ================= RESPONSIVE KHUSUS HALAMAN MEMBER ================= */

    @media (max-width: 768px) {

    * {
        box-sizing: border-box;
    }

    body {
        overflow-x: hidden;
        background-attachment: scroll;
    }

    .content {
        width: 100%;
        max-width: 100vw;
        overflow-x: hidden;
        margin-top: 70px;
    }

    .top-header {
        width: 100%;
        max-width: 100vw;
        overflow: hidden;
        justify-content: space-between;
        padding: 10px 8px;
        gap: 0;
    }

    .top-header > .header-btn:not(.header-left) {
        display: none;
    }

    .header-left {
        position: static;
        display: block;
        font-size: 10px;
        padding: 6px 9px;
    }

    .header-right {
        position: static;
        display: flex;
        gap: 6px;
        align-items: center;
    }

    .mobile-menu-btn {
        display: inline-block;
    }

    .desktop-help {
        display: none !important;
    }

    #muteBtn,
    #mobileMenuBtn {
        display: inline-block;
        min-width: 38px;
        font-size: 17px;
        padding: 5px 8px;
    }

    .mobile-nav-panel {
        position: fixed;
        top: 52px;
        right: 8px;
        width: 190px;
        display: none;
        flex-direction: column;
        gap: 7px;
        padding: 10px;
        background: white;
        border: 2px solid #e20514;
        border-radius: 10px;
        box-shadow: 0 8px 18px rgba(0,0,0,0.45);
        z-index: 9999;
    }

                else if (member.status === "Suspended") statusClass = "status-suspended";
                else if (member.status === "Graduation") statusClass = "status-graduation";

                card.className = `member-card ${member.team} ${genClass} ${statusClass}`;

            let isKaptenJKT48 =
                member.name === "Freya Jayawardana"
                
            let isAnnounced = 
                 member.name === "Cathleen Nixie" || 
                 member.name === "Chelsea Davina";

            let isHiatus =     
                member.name === "Feni Fitriyanti" ||
                member.name === "Sami Maono";

            let isSuspended =     
                member.name === "Gendis Mayrannisa";

                card.innerHTML = `    
                    
                    ${isKaptenJKT48 ? `<div class="card-badge"></div>`:""}
                    ${isAnnounced ? `<div class="card-badge"></div>` : ""}
                    ${isHiatus ? `<div class="card-badge"></div>` : ""}
                    ${isSuspended ? `<div class="card-badge"></div>` : ""}

                    <div class="photo-frame">
                        <img class="member-photo" src="${member.photo}" alt="${member.name}">
                            
                    </div>

                        <div class="member-name">${member.name}</div>
                        <div class="member-gen">${member.gen}</div>
                    `;

                card.onclick = () => {

                    const nama = encodeURIComponent(member.name);
                    openProfile(nama, card);
                };

                card.style.animationDelay = `${Math.min(count * 0.055, 0.75)}s`;

                    grid.appendChild(card);

                    requestAnimationFrame(() => {
                        card.classList.add("show");
                    });

                    count++;
                });
            }

        function openProfile(nama, card) {
            const transition = document.getElementById("pageTransition");

            document.querySelectorAll(".member-card").forEach(c => {
                if (c !== card) {
                    c.style.opacity = "0";
                    c.style.transform = "scale(0.9)";
                    c.style.filter = "blur(5px)";
                    c.style.transition = "all 0.5s ease";
                }
            });

            card.style.transition = "all 0.6s cubic-bezier(0.7,0,0.3)";
            card.style.transform = "scale(1.4)";
            card.style.zIndex = "999";
            card.style.boxShadow = "0 20px 60px rgba(0,0,0,1)";

            setTimeout(() => {
                transition.style.opacity = "1";
            }, 150);

            setTimeout(() => {
                window.location.href = `profilemembers.html?name=${nama}`;
            }, 550);
        }

        renderMembers();
        updateSummary();

        document.body.classList.add("bg-semua");
        document.body.classList.add("mode-semua");  

        function updateStatusSummary() {
            const hiatus = members.filter(m => m.status === "Hiatus").length;
            const suspended = members.filter(m => m.status === "Suspended").length;
            const active = members.length - hiatus - suspended;
            const graduation = members.filter(m => m.status === "Graduation").length;

            const isMobile = window.innerWidth <= 768;

            if (isMobile) {
                document.getElementById("summaryStatus").innerHTML = `
                    Aktif:<span style="color:#00c103">${active}</span> |
                    Hiatus:<span style="color:#ff9800">${hiatus}</span> |
                    Suspend:<span style="color:#000000">${suspended}</span> |
                    Grad:<span style="color:#ff348c;">${graduation}</span>
                `;
            } else {
                document.getElementById("summaryStatus").innerHTML = `
                    Aktif : <span style="color:#00c103">${active}</span> &nbsp; | &nbsp;
                    Hiatus : <span style="color:#ff9800">${hiatus}</span> &nbsp; | &nbsp;
                    Suspended : <span style="color:#000000">${suspended}</span> &nbsp; | &nbsp;
                    Graduation Announcement : <span style="color:#ff348c;">${graduation}</span>
                `;
            }
        }

        updateStatusSummary();

        function updateMobileFilterText() {
            const isMobile = window.innerWidth <= 768;

            const labels = {
                SemuaMember: isMobile ? "SEMUA" : "Semua Member",
                TeamLove: isMobile ? "LOVE" : "Team Love",
                TeamDream: isMobile ? "DREAM" : "Team Dream",
                TeamPassion: isMobile ? "PASSION" : "Team Passion",
                Trainee: isMobile ? "TRAINEE" : "Trainee",
                Virtual: isMobile ? "VIRTUAL" : "JKT48 Virtual"
            };

            document.querySelectorAll(".filter").forEach(btn => {
                btn.textContent = labels[btn.dataset.filter];
            });
        }

        updateMobileFilterText();

        window.addEventListener("resize", () => {
            updateMobileFilterText();
            updateStatusSummary();
        });

        const filterButtons = document.querySelectorAll(".filter")
            filterButtons.forEach(btn => {
                btn.addEventListener("click", () => {

                    filterButtons.forEach(b => b.classList.remove("active"));

                    btn.classList.add("active");

                    const filter = btn.getAttribute("data-filter");

                    updateTeamSlogan(filter);

                    grid.classList.remove("fade-in");
                    grid.classList.add("fade-out");

                    setTimeout(() => {
                        renderMembers(filter);

                        grid.classList.remove("fade-out");
                        grid.classList.add("fade-in");
                    }, 300);

                    document.body.classList.remove(
                        "bg-semua", "bg-love", "bg-dream", "bg-passion", "bg-trainee", "bg-virtual", "mode-semua"
                    );

                    if (filter === "SemuaMember") {
                        document.body.classList.add("bg-semua");
                        document.body.classList.add("mode-semua");
                    }

                    if (filter === "TeamLove") document.body.classList.add("bg-love");
                    if (filter === "TeamDream") document.body.classList.add("bg-dream");
                    if (filter === "TeamPassion") document.body.classList.add("bg-passion");
                    if (filter === "Trainee") document.body.classList.add("bg-trainee");
                    if (filter === "Virtual") document.body.classList.add("bg-virtual");

                    setBGM(filter);

                    document.querySelector(".filter-wrapper").classList.remove("open");

                });
            });

        function openWithDelay() {
            setTimeout(() => {
                window.open("https://rh26.jkt48.com");
            }, 800);
        }

        function goBackMenu() {
            const transition = document.getElementById("pageTransition");

            if (transition) {
                transition.style.opacity = "1";
            }

            localStorage.setItem("openMenu", "true");

            setTimeout(() => {
                window.location.href = "menu.html";
            }, 400);
        }

        const currentPage = window.location.pathname.split("/").pop();

            document.querySelectorAll(".header-btn").forEach(btn => {
                const page = btn.getAttribute("data-page");

                if (
                    (page === "member" && currentPage === "Member.html") ||
                    (page === "news" && currentPage === "News.html") ||
                    (page === "schedule" && currentPage === "Schedule.html") ||
                    (page === "theater" && currentPage === "Theater.html") ||
                    (page === "songs" && currentPage === "Songs.html") ||
                    (page === "sister" && currentPage === "Sister.html")
                ) {
                    btn.classList.add("active");
                }
            });

        function goToMember() {
            window.location.href = "Member.html";
        }

        function goToSongs() {
            window.location.href = "Songs.html";
        }

        const scrollBtn = document.getElementById("scrollTopBtn");

        window.addEventListener("scroll", () => {
            if (window.scrollY > 300) {
                scrollBtn.classList.add("show");
            } else {
                scrollBtn.classList.remove("show");
            }
        });

        function scrollToTop() {
            window.scrollTo({
                top: 0,
                behavior: "smooth"
            });
        }

        const virtualPlaylist = [
            "Musik/Virtual.mp3",
            "Musik/Virtual2.mp3"
        ];

        let virtualIndex = 0;

        document.addEventListener("click", () => {
            bgm.play().catch(() => {});
        }, { once: true });

        function setBGM(filter) {

        let src = "Musik/SemuaMember.mp3";

            if (filter === "TeamLove") src = "Musik/TeamLove.mp3";
            if (filter === "TeamDream") src = "Musik/TeamDream.mp3";
            if (filter === "TeamPassion") src = "Musik/TeamPassion.mp3";
            if (filter === "Trainee") src = "Musik/Trainee.mp3";
            if (filter === "Virtual") {
            virtualIndex = 0;
            playVirtualBGM();
            return;
            }

            if (bgm.src.includes(src)) return;

            bgm.src = src;
            bgm.play();
        }

        function playVirtualBGM() {
            bgm.src = virtualPlaylist[virtualIndex];
            bgm.play();

            bgm.onended = () => {
                virtualIndex = (virtualIndex + 1) % virtualPlaylist.length;
                playVirtualBGM();
            };
        }

        let isMuted = false;

        function toggleMute() {
            const btn = document.getElementById("muteBtn");

            isMuted = !isMuted;

            bgm.muted = isMuted;

            if (isMuted) {
                btn.textContent = "🔇";
            } else {
                btn.textContent = "🔊";
            }

            localStorage.setItem("bgm_muted", isMuted);
        }

        function toggleMobileMenu() {
            const panel = document.getElementById("mobileNavPanel");
            panel.classList.toggle("show");
        }

        document.addEventListener("click", (e) => {
            const panel = document.getElementById("mobileNavPanel");
            const menuBtn = document.getElementById("mobileMenuBtn");

            if (!panel || !menuBtn) return;

            if (
                window.innerWidth <= 768 &&
                !panel.contains(e.target) &&
                !menuBtn.contains(e.target)
            ) {
                panel.classList.remove("show");
            }
        });

        function toggleFilterMenu() {
            const wrapper = document.querySelector(".filter-wrapper");
            wrapper.classList.toggle("open");
        }

    </script>
    </html>
