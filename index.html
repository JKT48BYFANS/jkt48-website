        #pageTransition {

        .page {

        top: 0;
        left: 0;
        opacity: 0;
        transform: translateY(20px);

        padding-top: 0px;
        text-align: center;

        justify-items: center;

        transform: translateY(-100%);
        opacity: 0;
    }

        .top-header.show-header {
        animation: slideDown 0.5s ease forwards;
    }
    
        .header-content {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        color: #e20514  ;
        font-size: 40px;
        text-align: center;
        letter-spacing: 1px;

    }

        @font-face {

        src: url('Fonts/Insanibc.ttf') format('truetype');

    }

        @font-face {
        font-family: 'Insanibu';
        src: url('Fonts/Insanibu.ttf') format('truetype');
        font-weight: bold;

        @keyframes slideDown {
        from {
            transform: translateY(-100%);
            opacity: 0;
        }
        to {
            transform: translateY(0);

<script>
    
        function openWithDelay() {
        setTimeout(() => {
        window.open("https://rh26.jkt48.com");
        }, 800); 
        }
    
        function showPage(pageId){
        const pages = document.querySelectorAll('.page');

        pages.forEach(p => {
            p.classList.remove('show');
            p.style.display = 'none';
        });

        const page = document.getElementById(pageId);
        page.style.display = 'flex';     
        setTimeout(()=>{ page.classList.add('show'); }, 10);
        
        const homeBtn = document.querySelector('.home-btn');
        const header = document.querySelector('.top-header');
        const buttons = document.querySelectorAll('.menu-buttons');
        const headerBtns = document.querySelectorAll('.header-btn');

        homeBtn.classList.remove('show-home-btn');
        setTimeout(() => {
        homeBtn.classList.add('show-home-btn');
        }, 500);

        headerBtns.forEach(btn => {
            btn.classList.remove('show-header-btn');
        });

        if(pageId === "menu"){
            setTimeout(() => {
                header.classList.add('show-header');
            }, 100);
            
            setTimeout(() => {
                headerBtns.forEach((btn, i) => {
                    setTimeout(() => {
                        btn.classList.add('show-header-btn');
                    }, i * 100);
                });
            }, 500);
            
            setTimeout(() => {
                buttons.forEach((btn, i) => {
                    setTimeout(() => {
                        btn.classList.add('show-buttons');
                    }, i * 150);
                });
            }, 700);
        }

        if(pageId === "menu"){
            document.body.style.overflow = "hidden";
        } else {
            document.body.style.overflow = "auto";
        }
    }

    document.getElementById("btnHome").addEventListener("click", () => {
    pageOut("menu.html");
});

    document.getElementById("btnBack").addEventListener("click", () => {
        showPage("home");
    });

    document.addEventListener("DOMContentLoaded", () => {
        document.body.classList.add("show");
    });

    function pindahHalaman(){
    document.body.style.opacity = "0";
    setTimeout(() => {
        window.location.href = "anggota.html?page=menu";
    }, 300);
    }

    const params = new URLSearchParams(window.location.search);

    if(params.get("page") === "menu"){
        showPage("menu");
    }else{
        showPage("home");
    }

    history.replaceState(null, "", window.location.pathname);

    function pageOut(url) {
    const t = document.getElementById("pageTransition");
        t.style.opacity = "1";

        setTimeout(() => {
            window.location.href = url;
        }, 400);
    }

    window.addEventListener("DOMContentLoaded", () => {

    const openMenu = localStorage.getItem("openMenu");

    if (openMenu === "true") {
        
        localStorage.removeItem("openMenu");
        
        showMenuPage(); 
        }
    });
        
</script>
